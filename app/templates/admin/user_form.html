{% extends "admin/base.html" %}
{% block title %}{{ title }} – Admin{% endblock %}
{% block page_title %}{{ title }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">
        <form method="POST">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="row g-3">
            <div class="col-6"><label class="form-label fw-semibold small">First Name</label><input type="text" name="first_name" class="form-control" value="{{ user.first_name if user else '' }}" required></div>
            <div class="col-6"><label class="form-label fw-semibold small">Last Name</label><input type="text" name="last_name" class="form-control" value="{{ user.last_name if user else '' }}" required></div>
            <div class="col-12"><label class="form-label fw-semibold small">Email</label><input type="email" name="email" class="form-control" value="{{ user.email if user else '' }}" required {% if user %}readonly{% endif %}></div>
            <div class="col-6"><label class="form-label fw-semibold small">Role</label>
              <select name="role" class="form-select">
                {% for r in ['Tourist','Guide','Hotel','Restaurant','Agency Admin','Super Admin'] %}
                <option value="{{ r }}" {% if user and user.role==r %}selected{% endif %}>{{ r }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-6"><label class="form-label fw-semibold small">Phone</label><input type="text" name="phone" class="form-control" value="{{ user.phone if user else '' }}"></div>
            <div class="col-6"><label class="form-label fw-semibold small">Heritage Points</label><input type="number" name="heritage_points" class="form-control" value="{{ user.heritage_points if user else 0 }}"></div>
            <div class="col-6">
              <label class="form-label fw-semibold small">Email Verified</label><br>
              <div class="form-check form-switch mt-1">
                <input type="checkbox" name="is_verified" class="form-check-input" id="verSwitch" {% if user and user.is_verified %}checked{% endif %}>
                <label class="form-check-label" for="verSwitch">Verified</label>
              </div>
            </div>
            <div class="col-12"><label class="form-label fw-semibold small">Password {% if user %}<span class="text-muted">(leave blank to keep current)</span>{% endif %}</label><input type="password" name="password" class="form-control" {% if not user %}required{% endif %} placeholder="Enter password"></div>
          </div>
          <div class="mt-4 d-flex gap-2">
            <button type="submit" class="btn btn-gold px-4">Save User</button>
            <a href="{{ url_for('admin.users') }}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
