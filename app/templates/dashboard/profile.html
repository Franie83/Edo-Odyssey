{% extends "base.html" %}
{% block title %}Edit Profile – Edo Odyssey{% endblock %}
{% block content %}
<div class="page-hero"><div class="container"><h1><i class="bi bi-person me-2 text-gold"></i>Edit Profile</h1></div></div>
<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-lg-7">
      <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
          <form method="POST" action="{{ url_for('dashboard.profile') }}" enctype="multipart/form-data">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="text-center mb-4">
              {% if current_user.avatar_url %}<img src="{{ current_user.avatar_url }}" class="rounded-circle mb-2 border border-gold border-3" width="80" height="80">{% else %}<div class="avatar-lg mx-auto mb-2">{{ current_user.first_name[0] }}{{ current_user.last_name[0] }}</div>{% endif %}
              <div><input type="file" name="avatar" class="form-control form-control-sm mt-2" accept="image/*"></div>
            </div>
            <div class="row g-3">
              <div class="col-6"><label class="form-label fw-semibold small">First Name</label><input type="text" name="first_name" class="form-control" value="{{ current_user.first_name }}" required></div>
              <div class="col-6"><label class="form-label fw-semibold small">Last Name</label><input type="text" name="last_name" class="form-control" value="{{ current_user.last_name }}" required></div>
              <div class="col-12"><label class="form-label fw-semibold small">Email</label><input type="email" class="form-control bg-gray-50" value="{{ current_user.email }}" disabled></div>
              <div class="col-6"><label class="form-label fw-semibold small">Phone</label><input type="text" name="phone" class="form-control" value="{{ current_user.phone or '' }}"></div>
              <div class="col-6"><label class="form-label fw-semibold small">Nationality</label><input type="text" name="nationality" class="form-control" value="{{ current_user.nationality or '' }}"></div>
              <div class="col-12"><label class="form-label fw-semibold small">Address</label><input type="text" name="address" class="form-control" value="{{ current_user.address or '' }}"></div>
              <div class="col-12"><label class="form-label fw-semibold small">Bio</label><textarea name="bio" class="form-control" rows="3">{{ current_user.bio or '' }}</textarea></div>
              <div class="col-12"><hr><h6 class="fw-bold text-blue">Change Password (optional)</h6></div>
              <div class="col-12"><label class="form-label fw-semibold small">New Password</label><input type="password" name="new_password" class="form-control" placeholder="Leave blank to keep current"></div>
            </div>
            <div class="mt-4 d-flex gap-2">
              <button type="submit" class="btn btn-blue px-4 fw-semibold">Save Changes</button>
              <a href="{{ url_for('dashboard.index') }}" class="btn btn-outline-secondary">Cancel</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
