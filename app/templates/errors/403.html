{% extends "base.html" %}
{% block title %}403 Forbidden – Edo Odyssey{% endblock %}
{% block content %}
<div class="min-vh-100 d-flex align-items-center" style="background:linear-gradient(135deg,var(--blue-900),var(--blue-700))">
  <div class="container text-center py-5">
    <div class="brand-icon mx-auto mb-4" style="width:80px;height:80px;font-size:2.5rem;background:rgba(201,162,39,.2);border:2px solid var(--gold-500)"><i class="bi bi-shield-x text-gold"></i></div>
    <h1 class="text-white" style="font-family:'Playfair Display',serif;font-size:5rem;font-weight:700">403</h1>
    <h2 class="text-gold mb-3">Access Forbidden</h2>
    <p class="text-white-50 mb-4">You don't have permission to access this page.<br>Please contact your administrator if you believe this is an error.</p>
    <div class="d-flex gap-3 justify-content-center">
      <a href="{{ url_for('main.home') }}" class="btn btn-gold btn-lg px-4"><i class="bi bi-house me-2"></i>Return Home</a>
      <a href="{{ url_for('auth.login') }}" class="btn btn-outline-light btn-lg px-4"><i class="bi bi-person me-2"></i>Login</a>
    </div>
  </div>
</div>
{% endblock %}
