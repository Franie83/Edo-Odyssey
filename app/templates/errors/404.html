{% extends "base.html" %}
{% block title %}404 Not Found – Edo Odyssey{% endblock %}
{% block content %}
<div class="min-vh-100 d-flex align-items-center" style="background:linear-gradient(135deg,var(--blue-900),var(--blue-700))">
  <div class="container text-center py-5">
    <div class="brand-icon mx-auto mb-4" style="width:80px;height:80px;font-size:2.5rem"><i class="bi bi-compass-fill"></i></div>
    <h1 class="text-gold" style="font-family:'Playfair Display',serif;font-size:5rem;font-weight:700">404</h1>
    <h2 class="text-white mb-3">Page Not Found</h2>
    <p class="text-white-50 mb-4">The page you're looking for doesn't exist or has been moved.<br>Let us guide you back to the right path.</p>
    <div class="d-flex gap-3 justify-content-center flex-wrap">
      <a href="{{ url_for('main.home') }}" class="btn btn-gold btn-lg px-4"><i class="bi bi-house me-2"></i>Return Home</a>
      <a href="{{ url_for('attractions.list_attractions') }}" class="btn btn-outline-light btn-lg px-4"><i class="bi bi-building me-2"></i>Browse Attractions</a>
    </div>
  </div>
</div>
{% endblock %}
