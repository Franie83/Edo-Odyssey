{% extends "admin/base.html" %}

{% block title %}
{{ title }}
{% endblock %}

{% block content %}

<div class="container-fluid">

    <h3 class="mb-4">
        {{ title }}
    </h3>

    <form method="POST"
          enctype="multipart/form-data">

        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="card">

            <div class="card-body">

                <div class="mb-3">
                    <label class="form-label">Attraction Name</label>

                    <input
                        type="text"
                        class="form-control"
                        name="name"
                        value="{{ attraction.name if attraction else '' }}"
                        required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Category</label>

                    <select
                        class="form-select"
                        name="category_id">

                        {% for category in categories %}
                        <option
                            value="{{ category.id }}"
                            {% if attraction and attraction.category_id==category.id %}selected{% endif %}>
                            {{ category.name }}
                        </option>
                        {% endfor %}

                    </select>

                </div>

                <div class="mb-3">
                    <label>Description</label>

                    <textarea
                        class="form-control"
                        rows="5"
                        name="description">{{ attraction.description if attraction else '' }}</textarea>

                </div>

                <div class="mb-3">
                    <label>Address</label>

                    <input
                        class="form-control"
                        name="address"
                        value="{{ attraction.address if attraction else '' }}">
                </div>

                <div class="row">

                    <div class="col-md-6">

                        <label>Latitude</label>

                        <input
                            class="form-control"
                            name="latitude"
                            value="{{ attraction.latitude if attraction else '' }}">

                    </div>

                    <div class="col-md-6">

                        <label>Longitude</label>

                        <input
                            class="form-control"
                            name="longitude"
                            value="{{ attraction.longitude if attraction else '' }}">

                    </div>

                </div>

                <br>

                <div class="mb-3">

                    <label>Ticket Price</label>

                    <input
                        class="form-control"
                        name="ticket_price"
                        value="{{ attraction.ticket_price if attraction else '' }}">

                </div>

                <div class="mb-3">

                    <label>Opening Hours</label>

                    <input
                        class="form-control"
                        name="opening_hours"
                        value="{{ attraction.opening_hours if attraction else '' }}">

                </div>

                <div class="mb-3">

                    <label>Website</label>

                    <input
                        class="form-control"
                        name="website"
                        value="{{ attraction.website if attraction else '' }}">

                </div>

                <div class="mb-3">

                    <label>Contact</label>

                    <input
                        class="form-control"
                        name="contact"
                        value="{{ attraction.contact if attraction else '' }}">

                </div>

                <div class="mb-3">

                    <label>History</label>

                    <textarea
                        class="form-control"
                        rows="5"
                        name="history">{{ attraction.history if attraction else '' }}</textarea>

                </div>

                <div class="mb-3">

                    <label>Image</label>

                    <input
                        type="file"
                        class="form-control"
                        name="image"
                        accept="image/*">

                </div>

                {% if attraction and attraction.image_url %}

                <img
                    src="{{ attraction.image_url }}"
                    width="250"
                    class="img-thumbnail mb-3">

                {% endif %}

                <div class="form-check">

                    <input
                        class="form-check-input"
                        type="checkbox"
                        name="featured"
                        {% if attraction and attraction.featured %}checked{% endif %}>

                    <label class="form-check-label">
                        Featured
                    </label>

                </div>

                <div class="form-check mb-4">

                    <input
                        class="form-check-input"
                        type="checkbox"
                        name="active"
                        {% if not attraction or attraction.active %}checked{% endif %}>

                    <label class="form-check-label">
                        Active
                    </label>

                </div>

                <button
                    class="btn btn-primary">

                    Save Attraction

                </button>

                <a
                    href="{{ url_for('admin.attractions') }}"
                    class="btn btn-secondary">

                    Cancel

                </a>

            </div>

        </div>

    </form>

</div>

{% endblock %}
